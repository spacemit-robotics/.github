name: Reusable Sync to Gitee

on:
  workflow_call:
    inputs:
      branch:
        description: Branch to sync to Gitee
        required: false
        type: string
        default: main
      gitee_org:
        description: Gitee organization or user name
        required: false
        type: string
        default: spacemit-robotics
      gitee_repo:
        description: Override the target Gitee repository name
        required: false
        type: string
        default: ""
    secrets:
      GITEE_SSH_PRIVATE_KEY:
        required: true

permissions:
  contents: read

concurrency:
  group: sync-to-gitee-${{ github.repository }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.ref_name == inputs.branch
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ inputs.branch }}
      GITEE_ORG: ${{ inputs.gitee_org }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target repository
        id: target
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ -n "${{ inputs.gitee_repo }}" ]; then
            repo_name="${{ inputs.gitee_repo }}"
          fi

          echo "repo_name=${repo_name}" >> "${GITHUB_OUTPUT}"
          echo "repo_url=git@gitee.com:${GITEE_ORG}/${repo_name}.git" >> "${GITHUB_OUTPUT}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}

      - name: Install pinned Gitee known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat <<'EOF' > ~/.ssh/known_hosts
          gitee.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEKxHSJ7084RmkJ4YdEi5tngynE8aZe2uEoVVsB/OvYN
          gitee.com ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBMuEoYdx6to5oxR60IWj8uoe1aI0XfKOHWOtLqTg1tsLT1iFwXV5JmFjU46EzeMBV/6EmI1uaRI6HiEPtPtJHE=
          gitee.com ssh-rsa 
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Configure Gitee remote
        shell: bash
        run: |
          git remote remove gitee 2>/dev/null || true
          git remote add gitee "${{ steps.target.outputs.repo_url }}"

      - name: Push branch to Gitee
        shell: bash
        run: |
          echo "Syncing ${GITHUB_REPOSITORY}@${GITHUB_SHA} to ${{ steps.target.outputs.repo_url }}"
          git push gitee "HEAD:${TARGET_BRANCH}"
